<!DOCTYPE html>
<html>
<head>
    <title>TravelShield AI</title>
</head>
<body style="font-family: Arial; text-align: center; padding: 50px;">

    <h1>🌍 TravelShield AI</h1>

    <p>Enter a destination to check travel safety</p>

    <input id="location" type="text" placeholder="e.g. USA" style="padding:10px; width:200px;">
    <br><br>

    <button onclick="checkSafety()" style="padding:10px 20px;">
        Check Safety
    </button>

    <p id="result" style="margin-top:30px; color:green;"></p>

    <p style="margin-top:30px; color:gray;">
        This is your first simple website version 🚀
    </p>

    <script>
        function checkSafety() {
            let place = document.getElementById("location").value;
            document.getElementById("result").innerText =
                "Checking safety for " + place + "... (demo mode)";
        }
    </script>

</body>
</html>
