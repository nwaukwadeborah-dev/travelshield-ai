<!DOCTYPE html>
<html>
<head>
    <title>TravelShield AI</title>
</head>

<body style="font-family: Arial; text-align: center; padding: 50px;">

    <h1>🌍 TravelShield AI</h1>

    <p>Enter a destination to check travel safety</p>

    <input id="countryInput" type="text" placeholder="e.g. London, USA"
        style="padding:10px; width:200px;">

    <br><br>

    <button onclick="checkSafety()" style="padding:10px 20px;">
        Check Safety
    </button>

    <p id="result" style="margin-top:30px; color:gray;"></p>

    <script>
        function checkSafety() {
            let country = document.getElementById("countryInput").value;

            if (!country) {
                document.getElementById("result").innerText = "Please enter a location.";
                return;
            }

            document.getElementById("result").innerText =
                "Checking safety for " + country + "...";

            setTimeout(() => {
                document.getElementById("result").innerText =
                    country + " is currently SAFE to visit (demo result).";
            }, 1500);
        }
    </script>

</body>
</html>
